---
timezone: America/Denver
base_apt_force_ipv4: true

homelab_failure_notify_enabled: true
homelab_failure_notify_unit_name: homelab-unit-failure@
homelab_failure_notify_ntfy_url: "{{ vault_homelab_failure_notify_ntfy_url | default('') }}"
homelab_failure_notify_ntfy_token: "{{ vault_homelab_failure_notify_ntfy_token | default('') }}"

base_packages:
  - vim
  - curl
  - jq
  - wget
  - net-tools
  - ca-certificates
  - gnupg
  - acl

base_groups:
  - name: koerbcm
    gid: 1032
  - name: docker

base_users:
  - name: koerbcm
    uid: 1032
    comment: Chris Koerber,,,
    shell: /bin/bash
    home: /home/koerbcm
    groups:
      - sudo
    sudo: true
    sudo_nopasswd: false
    authorized_keys:
      - ssh-rsa  chris.koerber@developm3nt.com
      - ssh-rsa  koerbcm@winQAVKTC3
      - ssh-rsa  koerbcm@playful-steed
      - ssh-rsa  koerbcm@docker1

base_extra_users:
  - name: docker
    uid: 1000
    comment: Container runtime service account
    group: docker
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false
    password: "!"
base_break_glass_users:
  - koerbcm
base_require_break_glass_passwords: true

docker_admin_user: koerbcm
docker_admin_users:
  - koerbcm

docker_gelf_address: "udp://10.27.70.11:12202"
docker_dns_servers:
  - "10.27.70.1"

docker_cert_dir: /etc/docker/certs
docker_override_dir: /etc/systemd/system/docker.service.d
docker_override_file: /etc/systemd/system/docker.service.d/override.conf
docker_service_execstart: "/usr/bin/dockerd --containerd=/run/containerd/containerd.sock"
docker_daemon_hosts:
  - "unix:///var/run/docker.sock"
docker_tls_enabled: false
docker_tls_verify: false
docker_tls_san_ips: []
docker_tls_subject_alt_names: []
docker_server_cert_common_name: "{{ inventory_hostname }}"
docker_cert_valid_days: 3650

homelab_stack_root: /opt/stacks

# Optional global pull policy for Compose-managed services.
# Set at runtime for controlled refreshes, e.g.:
# ansible-playbook playbooks/site.yml --limit docker1,docker2 --tags apps -e docker_compose_pull_policy=always
# Optional one-time recreate control for Compose-managed services.
# Useful when daemon-level defaults (for example logging driver) change and
# existing containers need replacement to pick up the new defaults:
# ansible-playbook playbooks/site.yml --limit docker1,docker2,pi1,pi2,pi4 --tags apps -e docker_compose_recreate=always

# Optional local Uptime Kuma maintenance hooks.
# Modes:
# - socket: direct Kuma Socket.IO automation (recommended)
# - api: legacy REST-wrapper mode
# - command: local command arrays on the control node
# Secret source note:
# Uptime Kuma and Kuma API credentials live in 1Password item UUID:
# v74gndaweoqmvoseo6s7zo3wvi
uptime_kuma_maintenance_enabled: true
uptime_kuma_maintenance_mode: socket
uptime_kuma_maintenance_start_command: []
uptime_kuma_maintenance_end_command: []
# Direct Kuma Socket.IO settings
uptime_kuma_server_url: "http://kuma.kirby.lan"
uptime_kuma_username: "koerbcm"
uptime_kuma_password: "{{ vault_uptime_kuma_password | default('') }}"
# Legacy REST-wrapper settings (kept for compatibility if mode=api)
uptime_kuma_api_base_url: "http://kuma-api.kirby.lan"
uptime_kuma_api_username: "ansible-maint"
uptime_kuma_api_password: "{{ vault_uptime_kuma_api_password | default('') }}"
uptime_kuma_api_access_token: "{{ vault_uptime_kuma_api_access_token | default('') }}"
uptime_kuma_api_secret_key: "{{ vault_uptime_kuma_api_secret_key | default('') }}"
uptime_kuma_api_maintenance_id: "3"
# Legacy wrapper path is /maintenance; develop branch is /maintenances.
uptime_kuma_monitor_audit_api_maintenance_path: "/maintenance"
uptime_kuma_api_validate_certs: true

nfs_mounts:
  # Baseline mounts for new hosts. Host-specific files can override/extend.
  - path: /mnt/dockerVolumes
    src: 10.27.27.9:/volume1/dockerVolumes
    fstype: nfs
    opts: auto,defaults,nofail,users,x-systemd.after=network-online.target,x-systemd.device-timeout=5s,x-systemd.automount
  - path: /mnt/backups
    src: 10.27.27.9:/volume1/backups
    fstype: nfs
    opts: auto,defaults,nofail,users,x-systemd.after=network-online.target,x-systemd.device-timeout=5s,x-systemd.automount

ntfy_version: v2.21.0
ntfy_arch_image_map:
  armv7l: "binwiederhier/ntfy:{{ ntfy_version }}-armv7"
  armv6l: "binwiederhier/ntfy:{{ ntfy_version }}-armv7"
  aarch64: "binwiederhier/ntfy:{{ ntfy_version }}"
  x86_64: "binwiederhier/ntfy:{{ ntfy_version }}"
  default: "binwiederhier/ntfy:{{ ntfy_version }}"
