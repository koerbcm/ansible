uptime_kuma_monitor_audit_expected_maintenance_scopes:
  - title: "Ansible Planned Maintenance"
    expected_monitor_path_names:
      - "External"
      - "Internal"
      - "Media"
      - "Infrastructure"
  - title: "Docker Container Updates"
    expected_monitor_path_names:
      - "External"
      - "Internal"
      - "Media"
      - "Infrastructure"
