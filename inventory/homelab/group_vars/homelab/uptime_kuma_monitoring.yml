---
# Uptime Kuma monitoring source-of-truth (audit mode).
# This does not mutate Kuma yet; it verifies drift and coverage.

uptime_kuma_monitor_audit_enabled: true
uptime_kuma_monitor_audit_check_unexpected_monitors: true
uptime_kuma_monitor_audit_apply_mode: false
uptime_kuma_monitor_audit_apply_create_missing_tags: true
uptime_kuma_monitor_audit_apply_add_missing_required_tags: true
uptime_kuma_monitor_audit_apply_enforce_maintenance_scope: true
uptime_kuma_monitor_audit_apply_create_missing_monitors: false
# Steady-state policy: UI-added monitors are reported as unexpected/backlog,
# not automatically deleted. Enable prune only for intentional cleanup waves.
uptime_kuma_monitor_audit_apply_delete_unexpected_monitors: false

# Keep audit non-blocking while we converge.
uptime_kuma_monitor_audit_fail_on_missing_tags: false
uptime_kuma_monitor_audit_fail_on_missing_monitors: false
uptime_kuma_monitor_audit_fail_on_monitor_tag_gaps: false
uptime_kuma_monitor_audit_fail_on_maintenance_scope_gaps: false

# Tag colors used if apply mode needs to create missing tags.
uptime_kuma_monitor_audit_tag_colors:
  docker1: "#D97706"
  docker2: "#0EA5E9"
  pi1: "#16A34A"
  pi2: "#8B5CF6"
  critical: "#DC2626"
  important: "#2563EB"
  best-effort: "#64748B"
  external: "#F59E0B"
  internal: "#10B981"
  container: "#4F46E5"
  backup: "#7C3AED"

uptime_kuma_monitor_audit_expected_tags:
  - docker1
  - docker2
  - pi1
  - pi2
  - critical
  - important
  - best-effort
  - external
  - internal
  - container
  - backup

uptime_kuma_monitor_audit_expected_monitors:
  - path_name: "External"
  - path_name: "Internal"
  - path_name: "Media"
  - path_name: "Infrastructure"

  - path_name: "External / Ombi"
    required_tags: ["docker1", "important", "external"]
  - path_name: "External / Paperless"
    required_tags: ["docker1", "critical", "external"]
  - path_name: "External / Nextcloud"
    required_tags: ["docker1", "critical", "external"]
  - path_name: "External / Ntfy"
    required_tags: ["pi2", "important", "external"]
    create_payload:
      name: "Ntfy"
      type: http
      url: "https://ntfy.koerbcm.com"
  - path_name: "External / n8n"
    required_tags: ["docker2", "critical", "external"]
    create_payload:
      name: "n8n"
      type: http
      url: "https://n8n.koerbcm.com"
  - path_name: "External / Invoice Ninja"
    required_tags: ["docker2", "critical", "external"]

  - path_name: "Internal / Ombi"
    required_tags: ["docker1", "important", "internal"]
  - path_name: "Internal / Paperless"
    required_tags: ["docker1", "critical", "internal"]
  - path_name: "Internal / Graylog"
    required_tags: ["docker1", "critical", "internal"]
    create_payload:
