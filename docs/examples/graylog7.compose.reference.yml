# Reference only: current manual Graylog stack on docker1 as of 2026-04-13.
# This file is not yet rendered or deployed by Ansible.
# It exists so the live Portainer/manual stack has a tracked home in the repo.
#
# Important:
# - This still reflects the current NFS-backed storage layout.
# - That storage model is known-bad for Graylog DataNode/OpenSearch data.
# - See docs/graylog-hardening.md before making further Graylog storage changes.

services:
  mongodb:
    image: "mongo:7.0"
    restart: "on-failure"
    networks:
      - graylog
    volumes:
      - "mongodb_data:/data/db"
      - "mongodb_config:/data/configdb"
    ports:
      - "27017:27017"
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true

  datanode:
    image: "${DATANODE_IMAGE:-graylog/graylog-datanode:7.0}"
    hostname: "datanode"
    environment:
      GRAYLOG_DATANODE_OPENSEARCH_HEAP: 15g
      GRAYLOG_DATANODE_INSECURE_STARTUP: true
      GRAYLOG_DATANODE_NODE_ID_FILE: "/var/lib/graylog-datanode/node-id"
      GRAYLOG_DATANODE_ROOT_USERNAME: "${GRAYLOG_ROOT_USERNAME}"
      GRAYLOG_DATANODE_PASSWORD_SECRET: "${GRAYLOG_PASSWORD_SECRET:?Please configure GRAYLOG_PASSWORD_SECRET in the .env file}"
      GRAYLOG_DATANODE_MONGODB_URI: "mongodb://mongodb:27017/graylog"
    ulimits:
      memlock:
        hard: -1
        soft: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "8999:8999/tcp"
      - "9200:9200/tcp"
      - "9300:9300/tcp"
    networks:
      - graylog
    volumes:
      - "graylog-datanode:/var/lib/graylog-datanode"
      - "backups:/mnt/backups"
      - "watchtower_hooks:/mnt/watchtower_hooks"
    restart: "on-failure"
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true

  graylog:
    hostname: "server"
    image: "${GRAYLOG_IMAGE:-graylog/graylog:7.0}"
    depends_on:
      mongodb:
        condition: "service_started"
      datanode:
        condition: "service_started"
    entrypoint: "/usr/bin/tini -- /docker-entrypoint.sh"
    environment:
      GRAYLOG_DATANODE_INSECURE_STARTUP: true
      GRAYLOG_NODE_ID_FILE: "/usr/share/graylog/data/data/node-id"
      GRAYLOG_ROOT_USERNAME: "${GRAYLOG_ROOT_USERNAME}"
      GRAYLOG_PASSWORD_SECRET: "${GRAYLOG_PASSWORD_SECRET:?Please configure GRAYLOG_PASSWORD_SECRET in the .env file}"
      GRAYLOG_ROOT_PASSWORD_SHA2: "${GRAYLOG_ROOT_PASSWORD_SHA2:?Please configure GRAYLOG_ROOT_PASSWORD_SHA2 in the .env file}"
      GRAYLOG_HTTP_BIND_ADDRESS: "0.0.0.0:9000"
      GRAYLOG_HTTP_EXTERNAL_URI: "http://10.27.70.11:9000/"
      GRAYLOG_MONGODB_URI: "mongodb://mongodb:27017/graylog"
      GRAYLOG_TIMEZONE: "America/Denver"
      TZ: "America/Denver"
      GRAYLOG_ELASTICSEARCH_HOSTS: "http://datanode:9200"
      GRAYLOG_TRANSPORT_EMAIL_PROTOCOL: "smtp"
      GRAYLOG_TRANSPORT_EMAIL_WEB_INTERFACE_URL: "http://10.27.70.11:9000/"
      GRAYLOG_TRANSPORT_EMAIL_HOSTNAME: "outbound.mailhop.org"
      GRAYLOG_TRANSPORT_EMAIL_ENABLED: "true"
      GRAYLOG_TRANSPORT_EMAIL_PORT: "587"
      GRAYLOG_TRANSPORT_EMAIL_USE_AUTH: "true"
      GRAYLOG_TRANSPORT_EMAIL_AUTH_USERNAME: "${GRAYLOG_TRANSPORT_EMAIL_AUTH_USERNAME}"
      GRAYLOG_TRANSPORT_EMAIL_AUTH_PASSWORD: "${GRAYLOG_TRANSPORT_EMAIL_AUTH_PASSWORD}"
      GRAYLOG_TRANSPORT_EMAIL_USE_TLS: "true"
      GRAYLOG_TRANSPORT_EMAIL_USE_SSL: "false"
      GRAYLOG_TRANSPORT_FROM_EMAIL: "graylog@koerbcm.com"
      GRAYLOG_TRANSPORT_SUBJECT_PREFIX: "[graylog]"
      GRAYLOG_ALLOW_LEADING_WILDCARD_SEARCHES: "true"
    ports:
      - "1514:1514/udp"
      - "1515:1515/udp"
      - "1518:1518/udp"
      - "5044:5044/tcp"
      - "5140:5140/udp"
      - "5140:5140/tcp"
      - "5555:5555/tcp"
      - "5555:5555/udp"
      - "9000:9000/tcp"
      - "12201:12201/tcp"
      - "12201:12201/udp"
      - "12202:12202/tcp"
      - "12202:12202/udp"
      - "13301:13301/tcp"
      - "13302:13302/tcp"
    networks:
      - graylog
    volumes:
      - "graylog_data:/usr/share/graylog/data/data"
      - "watchtower_hooks:/mnt/watchtower_hooks"
    restart: "on-failure"
    labels:
      - com.centurylinklabs.watchtower.monitor-only=true

networks:
  graylog:
    driver: "bridge"

volumes:
  mongodb_data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.27.27.9,nfsvers=4
      device: :/volume1/dockerVolumes/docker1/mongo7_data
  mongodb_config:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.27.27.9,nfsvers=4
      device: :/volume1/dockerVolumes/docker1/mongo7_config
  graylog-datanode:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.27.27.9,nfsvers=4
      device: :/volume1/graylog/datanode
  graylog_data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.27.27.9,nfsvers=4
      device: :/volume1/graylog/data
  backups:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.27.27.9,nfsvers=4
      device: :/volume1/backups/graylogDataNodeSnapshots
  watchtower_hooks:
    driver: local
    driver_opts:
      type: nfs
      o: addr=10.27.27.9,nfsvers=4
      device: :/volume1/dockerVolumes/docker1/watchtower_hooks
