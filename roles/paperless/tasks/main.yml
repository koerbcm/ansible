---
- name: Validate Paperless configuration
  ansible.builtin.assert:
    that:
      - paperless_project_dir | length > 0
      - paperless_compose_file | length > 0
      - paperless_web_image | length > 0
      - paperless_published_port | int > 0
      - paperless_db_image | length > 0
      - paperless_db_name | length > 0
      - paperless_db_user | length > 0
      - paperless_db_password | length > 0
      - paperless_db_data_dir | length > 0
      - paperless_broker_image | length > 0
      - paperless_redis_data_dir | length > 0
      - paperless_gotenberg_image | length > 0
      - paperless_gotenberg_published_port | int > 0
      - paperless_tika_image | length > 0
      - paperless_tika_published_port | int > 0
      - paperless_data_dir | length > 0
      - paperless_media_dir | length > 0
      - paperless_export_dir | length > 0
      - paperless_consume_dir | length > 0
      - paperless_url | length > 0
      - paperless_secret_key | length > 0
      - paperless_csrf_trusted_origins | length > 0
      - paperless_email_host | length > 0
      - paperless_email_from | length > 0
      - paperless_email_host_user | length > 0
      - paperless_tika_endpoint | length > 0
      - paperless_gotenberg_endpoint | length > 0
    fail_msg: "Paperless requires project settings, storage directories, database settings, secret key, endpoints, and mail settings."
    success_msg: "Paperless configuration is valid."
  when: paperless_enabled | bool

- name: Ensure Paperless project directory exists
  ansible.builtin.file:
    path: "{{ paperless_project_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: paperless_enabled | bool

- name: Ensure Paperless storage directories exist
  ansible.builtin.file:
    path: "{{ paperless_storage_dir }}"
    state: directory
  loop:
    - "{{ paperless_data_dir }}"
    - "{{ paperless_media_dir }}"
    - "{{ paperless_export_dir }}"
    - "{{ paperless_consume_dir }}"
    - "{{ paperless_db_data_dir }}"
    - "{{ paperless_redis_data_dir }}"
  loop_control:
    loop_var: paperless_storage_dir
  when: paperless_enabled | bool

- name: Render Paperless compose project
  ansible.builtin.template:
    src: "{{ playbook_dir | dirname }}/templates/paperless.compose.yml.j2"
    dest: "{{ paperless_project_dir }}/{{ paperless_compose_file }}"
    owner: root
    group: root
    mode: "0644"
  when: paperless_enabled | bool

- name: Deploy Paperless with Docker Compose
  community.docker.docker_compose_v2:
    project_name: "{{ paperless_project_name }}"
    project_src: "{{ paperless_project_dir }}"
    files:
      - "{{ paperless_compose_file }}"
    state: present
    pull: "{{ docker_compose_pull_policy | default(omit) }}"
  register: paperless_compose_result
  when:
    - paperless_enabled | bool
    - not ansible_check_mode

- name: Show Paperless compose actions
  ansible.builtin.debug:
    var: paperless_compose_result.actions
  when:
    - paperless_enabled | bool
    - not ansible_check_mode

- name: Skip Paperless compose deployment in check mode
  ansible.builtin.debug:
    msg: "Check mode enabled, skipping Paperless docker compose deployment."
  when:
    - paperless_enabled | bool
    - ansible_check_mode
