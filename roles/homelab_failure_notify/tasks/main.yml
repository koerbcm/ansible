---
- name: Install notification dependencies
  ansible.builtin.apt:
    name:
      - curl
    state: present
    update_cache: false
    lock_timeout: "{{ base_apt_lock_timeout | default(300) }}"
  when:
    - homelab_failure_notify_enabled | bool
    - ansible_os_family == "Debian"

- name: Install homelab unit failure notifier script
  ansible.builtin.template:
    src: homelab-unit-failure-notify.sh.j2
    dest: "{{ homelab_failure_notify_scripts_dir }}/homelab-unit-failure-notify.sh"
    owner: root
    group: root
    mode: "0755"
  when: homelab_failure_notify_enabled | bool

- name: Install homelab unit failure notifier environment
  ansible.builtin.template:
    src: homelab-unit-failure-notify.env.j2
    dest: "{{ homelab_failure_notify_environment_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: "{{ (homelab_failure_notify_ntfy_token | default('') | length) > 0 }}"
  when: homelab_failure_notify_enabled | bool

- name: Install homelab unit failure notifier systemd unit
  ansible.builtin.template:
    src: homelab-unit-failure@.service.j2
    dest: /etc/systemd/system/homelab-unit-failure@.service
    owner: root
    group: root
    mode: "0644"
  when: homelab_failure_notify_enabled | bool
  notify: Reload systemd
