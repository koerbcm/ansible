---
- name: Trigger pre-maintenance backup service
  block:
    - name: Start pre-maintenance backup service
      ansible.builtin.systemd:
        name: "{{ backup_service_name }}"
        state: started

    - name: Wait for pre-maintenance backup service to finish
      ansible.builtin.command:
        cmd: "systemctl is-active {{ backup_service_name }}"
      register: backup_trigger_active_state
      changed_when: false
      failed_when: backup_trigger_active_state.rc not in [0, 3]
      until: backup_trigger_active_state.stdout not in ["active", "activating", "reloading"]
      retries: "{{ backup_trigger_wait_retries }}"
      delay: "{{ backup_trigger_wait_delay }}"

    - name: Verify pre-maintenance backup service did not fail
      ansible.builtin.command:
        cmd: "systemctl is-failed {{ backup_service_name }}"
      register: backup_trigger_failed_state
      changed_when: false
      failed_when: backup_trigger_failed_state.stdout == "failed"

  rescue:
    - name: Capture recent journal output for failed backup service
      ansible.builtin.command:
        cmd: "journalctl -u {{ backup_service_name }} -n 80 --no-pager"
      register: backup_trigger_service_journal
      changed_when: false
      failed_when: false

    - name: Fail with backup service diagnostics
      ansible.builtin.fail:
        msg: |
          Pre-maintenance backup service failed: {{ backup_service_name }}
          Recent logs:
          {{ backup_trigger_service_journal.stdout | default('No journal output available.') }}
