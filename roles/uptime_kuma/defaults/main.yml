---
uptime_kuma_enabled: false
uptime_kuma_project_name: uptime-kuma
uptime_kuma_project_dir: "{{ homelab_stack_root }}/uptime-kuma"
uptime_kuma_compose_file: compose.yml
uptime_kuma_image: louislam/uptime-kuma:2.2.1
uptime_kuma_container_name: uptime-kuma
uptime_kuma_service_name: uptime-kuma
uptime_kuma_container_port: 3001
uptime_kuma_published_port: 9000
uptime_kuma_data_dir: /srv/uptime-kuma/data
uptime_kuma_data_dir_owner: "1000"
uptime_kuma_data_dir_group: "1000"
uptime_kuma_data_dir_mode: "0775"
uptime_kuma_allow_network_data_dir: false
uptime_kuma_environment_extra: {}
uptime_kuma_data_migration_enabled: false
uptime_kuma_data_migration_source_dir: ""
uptime_kuma_data_migration_only_when_destination_db_missing: true
