---
- name: Reload systemd and restart docker
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: docker
    state: restarted
  when: not ansible_check_mode

- name: Skip docker restart in check mode
  ansible.builtin.debug:
    msg: "Check mode enabled, skipping docker restart."
  when: ansible_check_mode

- name: Apply sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true
  when: not ansible_check_mode

- name: Skip sysctl apply in check mode
  ansible.builtin.debug:
    msg: "Check mode enabled, skipping sysctl --system."
  when: ansible_check_mode
